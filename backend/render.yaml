services:
  - type: web
    name: online-quiz-portal-backend
    env: node
    region: oregon  # or frankfurt, singapore depending on your preference
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.17.0  # or whatever version you prefer
      - key: MONGODB_URI
        sync: false  # This will be set manually in the Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false